<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>folder-gallery — playground</title>
  <link rel="stylesheet" href="../src/folder-gallery.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(1200px 600px at 50% -10%, #1c2230, #101216 60%);
      color: #e9e9e6;
      font: 15px/1.55 ui-sans-serif, system-ui, sans-serif;
    }
    main { max-width: 960px; margin: 0 auto; padding: 3.5rem 1.25rem 5rem; text-align: center; }
    h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 .35rem; letter-spacing: -.02em; }
    .tagline { color: #a7adb8; margin: 0 auto 2rem; max-width: 46ch; }
    code { background: #20242c; padding: .1em .4em; border-radius: 4px; font-size: .9em; }
    .controls { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; margin-bottom: 2.5rem; }
    .group { display: inline-flex; gap: .4rem; padding: .3rem; background: #191d24; border: 1px solid #2a2f38; border-radius: 999px; }
    .group > span { align-self: center; color: #7c828d; font-size: .78rem; padding: 0 .5rem 0 .7rem; }
    .group button {
      background: transparent; color: #cfd3da; border: 0; cursor: pointer;
      padding: .45rem .85rem; border-radius: 999px; font: inherit; transition: background .15s, color .15s;
    }
    .group button:hover { background: #232833; }
    .group button.active { background: #e9e9e6; color: #14161a; }
    folder-gallery { margin-top: 1rem; min-height: 460px; }
    .hint { color: #7c828d; font-size: .85rem; margin-top: 2rem; }
    .hint kbd { background: #20242c; border: 1px solid #333; border-bottom-width: 2px; border-radius: 4px; padding: .05em .4em; }
  </style>
</head>
<body>
  <main>
    <h1>folder-gallery</h1>
    <p class="tagline">A 3D folder gallery for <em>real content</em> — not a decorative folder icon. Stack, grid, and carousel modes; keyboard, wheel, and touch; themeable; accessible.</p>

    <div class="controls">
      <div class="group" role="group" aria-label="View mode">
        <span>View</span>
        <button data-mode="stack" class="active">Stack</button>
        <button data-mode="grid">Grid</button>
        <button data-mode="carousel">Carousel</button>
      </div>
      <div class="group" role="group" aria-label="Palette">
        <span>Palette</span>
        <button data-theme="studio" class="active">Studio</button>
        <button data-theme="warm">Warm</button>
        <button data-theme="mono">Mono</button>
      </div>
    </div>

    <folder-gallery id="fg" mode="stack" label="Demo projects"></folder-gallery>

    <p class="hint">Hover the stack and use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or your scroll wheel. Click the front folder to select it.</p>
  </main>

  <script type="module">
    import { defineFolderGallery } from '../src/folder-gallery-element.js';
    defineFolderGallery();

    const fg = document.getElementById('fg');

    const PALETTES = {
      studio: ['#2a3a3a', '#3d2e42', '#2a2d3e', '#3a3d2f', '#4a3030'],
      warm:   ['#4a3030', '#5a3d2a', '#5a4a2a', '#4a2e42', '#3d2f2f'],
      mono:   ['#3a3a3a', '#4a4a4a', '#2e2e2e', '#5a5a5a', '#252525'],
    };
    const TITLES = ['One Corner', 'Banglatown', 'Diversity', 'QoL NYC', 'Noise NYC'];

    function buildItems(theme) {
      const colors = PALETTES[theme];
      return TITLES.map((t, i) => ({
        label: t,
        color: colors[i % colors.length],
        content: `<div style="font-weight:600;color:#eee">${t}</div>`,
      }));
    }

    fg.items = buildItems('studio');
    fg.addEventListener('fg-select', (e) => console.log('fg-select', e.detail.item.label, e.detail.index));
    fg.addEventListener('fg-modechange', (e) => console.log('fg-modechange', e.detail.mode));

    function activate(groupSel, el) {
      document.querySelectorAll(`${groupSel} button`).forEach((b) => b.classList.remove('active'));
      el.classList.add('active');
    }

    document.querySelectorAll('[data-mode]').forEach((b) => {
      b.addEventListener('click', () => { fg.setMode(b.dataset.mode); activate('[aria-label="View mode"]', b); });
    });
    document.querySelectorAll('[data-theme]').forEach((b) => {
      b.addEventListener('click', () => { fg.items = buildItems(b.dataset.theme); activate('[aria-label="Palette"]', b); });
    });
  </script>
</body>
</html>
