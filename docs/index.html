<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flipfolio playground</title>
  <link rel="stylesheet" href="../src/folder-gallery.css">
  <style>
    * { box-sizing: border-box; }
    :root[data-theme='dark'] {
      color-scheme: dark;
      --page-bg: #101216;
      --canvas-dot: #262b33;
      --page-fg: #e9e9e6;
      --page-muted: #a7adb8;
      --page-faint: #7c828d;
      --panel-bg: #15181d;
      --chip-bg: #191d24;
      --chip-border: #2a2f38;
      --chip-fg: #cfd3da;
      --chip-hover: #232833;
      --chip-active-bg: #e9e9e6;
      --chip-active-fg: #14161a;
      --code-bg: #191d24;
    }
    :root[data-theme='light'] {
      color-scheme: light;
      --page-bg: #f3f1ec;
      --canvas-dot: #d9d5c9;
      --page-fg: #1c1c1a;
      --page-muted: #4a463e;
      --page-faint: #8a857a;
      --panel-bg: #faf8f2;
      --chip-bg: #ffffff;
      --chip-border: #d8d4c8;
      --chip-fg: #3a3830;
      --chip-hover: #eceade;
      --chip-active-bg: #1c1c1a;
      --chip-active-fg: #f3f1ec;
      --code-bg: #eceade;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--page-bg);
      color: var(--page-fg);
      font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
      transition: background .3s, color .3s;
    }

    /* ── top bar ── */
    .bar {
      flex: 0 0 auto;
      display: flex;
      align-items: baseline;
      gap: .8rem;
      padding: .8rem 1.1rem;
      border-bottom: 1px solid var(--chip-border);
      background: var(--panel-bg);
    }
    .bar h1 { font-size: 1.05rem; margin: 0; letter-spacing: -.01em; }
    .bar .tag { color: var(--page-muted); font-size: .85rem; }
    .bar .keys { margin-left: auto; color: var(--page-faint); font-size: .78rem; white-space: nowrap; }
    .bar kbd {
      background: var(--code-bg); border: 1px solid var(--chip-border);
      border-bottom-width: 2px; border-radius: 4px; padding: .02em .35em;
    }

    /* ── layout: control rail + canvas ── */
    main { flex: 1; display: flex; min-height: 0; }
    .panel {
      flex: 0 0 auto;
      width: 218px;
      min-width: 160px;
      max-width: 80vw; /* JS clamps the real drag range to keep the canvas >=20vw */
      padding: 1rem .9rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--panel-bg);
      overflow-y: auto;
    }
    /* Drag handle sits between the rail and the canvas. The rail's own
       width drives the canvas's available space (flex:1 on .canvas), so
       dragging this just resizes .panel - the existing ResizeObserver on
       .canvas (see fit()) picks up the resulting canvas resize on its own,
       no extra wiring needed to keep the gallery scaled correctly. */
    .panel-resize {
      flex: 0 0 5px;
      cursor: col-resize;
      background: var(--chip-border);
      position: relative;
      touch-action: none;
    }
    .panel-resize::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
    }
    .panel-resize:hover, .panel-resize.is-dragging { background: var(--page-faint); }
    .group { display: flex; flex-direction: column; gap: .4rem; }
    .group > span {
      color: var(--page-faint);
      font-size: .68rem;
      font-weight: 650;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .group .opts { display: flex; flex-wrap: wrap; gap: .35rem; }
    .opts button {
      background: var(--chip-bg); color: var(--chip-fg);
      border: 1px solid var(--chip-border); cursor: pointer;
      padding: .38rem .7rem; border-radius: 999px; font: inherit; font-size: .82rem;
      transition: background .15s, color .15s;
    }
    .opts button:hover { background: var(--chip-hover); }
    .opts button.active { background: var(--chip-active-bg); color: var(--chip-active-fg); border-color: var(--chip-active-bg); }
    .group.is-disabled { opacity: .4; pointer-events: none; }

    /* ── canvas: the sandbox stage ──
       .canvas is the fixed frame (dotted bg + the pinned readout); .viewport
       fills it and does the centering. In grid mode .viewport becomes a
       vertical scroller so tall grids keep full-size folders instead of
       being scaled down to fit the height. */
    .canvas {
      flex: 1;
      position: relative;
      min-width: 0;
      overflow: hidden;
      background-image: radial-gradient(var(--canvas-dot) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .viewport {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .viewport.is-scroll {
      overflow-y: auto;
      align-items: safe center;
      /* extra bottom room so the last row clears the pinned readout */
      padding: 24px 0 60px;
    }
    .stage { transform-origin: center center; }
    folder-gallery { display: block; }

    /* live API readout */
    .readout {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      max-width: min(92%, 640px);
      background: var(--code-bg);
      border: 1px solid var(--chip-border);
      border-radius: 8px;
      padding: .45rem .7rem;
      font: .74rem/1.4 ui-monospace, monospace;
      color: var(--page-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: copy;
    }
    .readout:hover { color: var(--page-fg); }

    /* ── peek contents: a flower polaroid + a city fact card ── */
    #fg.fg-root { --fg-peek-shift: -72%; }
    /* Contents stay clipped inside the folder at rest; the box only opens up
       while it is actually peeked, so tilted corners can hang out. */
    [data-fg-peek='always'] .fg-card.is-active .fg-content,
    [data-fg-peek='hover'] .fg-card.is-active:hover .fg-content,
    [data-fg-peek='hover'][data-fg-mode='grid'] .fg-card:hover .fg-content { overflow: visible; }
    .peek-pair {
      display: flex; gap: 16px; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }
    .pol {
      background: #fdfcf9; border-radius: 5px; padding: 8px;
      box-shadow: 0 14px 30px rgba(20, 20, 20, 0.28);
    }
    .pol--img { width: 42%; transform: rotate(-4deg); }
    .pol--img img { width: 100%; aspect-ratio: 5/4; object-fit: cover; display: block; border-radius: 3px; }
    .pol--img figcaption {
      font-size: .78rem; font-weight: 600; color: #3a3830;
      text-align: center; padding-top: 6px;
    }
    .pol--fact { width: 46%; transform: rotate(3deg); padding: 14px 16px; text-align: left; }
    .pol--fact h4 { font-size: .95rem; color: #1c1c1a; margin: 0 0 6px; }
    .pol--fact p { font-size: .82rem; line-height: 1.5; color: #55503f; margin: 0; }

    /* ── narrow screens: rail becomes a wrap of chips above the canvas ── */
    .keys--touch { display: none; }
    @media (max-width: 860px) {
      .bar .tag, .bar .keys { display: none; }
      .bar .keys--touch { display: block; margin-left: auto; }
      main { flex-direction: column; }
      .panel {
        flex: 0 0 auto;
        width: auto;
        flex-direction: row;
        flex-wrap: wrap;
        gap: .55rem .9rem;
        border-bottom: 1px solid var(--chip-border);
        padding: .55rem .7rem;
        overflow: visible;
      }
      /* Rail stacks above the canvas here - nothing left to drag sideways. */
      .panel-resize { display: none; }
      .group { flex-direction: row; align-items: center; gap: .4rem; }
      .group > span { font-size: .62rem; }
      .readout { display: none; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <h1>flipfolio</h1>
    <span class="tag">A 3D folder gallery that holds real content.</span>
    <span class="keys"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> or scroll to browse; click the front folder to select</span>
    <span class="keys keys--touch">swipe to browse, tap to select</span>
  </header>

  <main>
    <aside class="panel">
      <div class="group" role="group" aria-label="Theme">
        <span>Theme</span>
        <div class="opts">
          <button data-theme-pick="light" class="active">Light</button>
          <button data-theme-pick="dark">Dark</button>
        </div>
      </div>
      <div class="group" role="group" aria-label="View mode">
        <span>View</span>
        <div class="opts">
          <button data-mode="stack" class="active">Stack</button>
          <button data-mode="grid">Grid</button>
          <button data-mode="carousel">Carousel</button>
        </div>
      </div>
      <div class="group" role="group" aria-label="Content">
        <span>Content</span>
        <div class="opts">
          <button data-content="labels" class="active">Labels</button>
          <button data-content="photos">Photos</button>
          <button id="peekBtn">Peek</button>
        </div>
      </div>
      <div class="group" role="group" aria-label="Palette" id="paletteGroup">
        <span>Palette</span>
        <div class="opts">
          <button data-palette="studio">Studio</button>
          <button data-palette="warm">Warm</button>
          <button data-palette="mono">Mono</button>
          <button data-palette="manila" class="active">Manila</button>
        </div>
      </div>
    </aside>

    <div class="panel-resize" id="panelResize" role="separator" aria-orientation="vertical"
      aria-label="Resize control rail" tabindex="0"></div>

    <section class="canvas" id="canvas">
      <div class="viewport" id="viewport">
        <div class="stage" id="stage">
          <folder-gallery id="fg" mode="stack" data-fg-theme="light" label="Global cities"></folder-gallery>
        </div>
      </div>
      <div class="readout" id="readout" title="Click to copy"></div>
    </section>
  </main>

  <script type="module">
    import { defineFolderGallery } from '../src/folder-gallery-element.js';
    defineFolderGallery();

    const fg = document.getElementById('fg');
    const stage = document.getElementById('stage');
    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    const readout = document.getElementById('readout');
    const panel = document.querySelector('.panel');
    const panelResize = document.getElementById('panelResize');

    const PALETTES = {
      studio: { colors: ['#2a3a3a', '#3d2e42', '#2a2d3e', '#3a3d2f', '#4a3030'] },
      warm:   { colors: ['#4a3030', '#5a3d2a', '#5a4a2a', '#4a2e42', '#3d2f2f'] },
      mono:   { colors: ['#3a3a3a', '#4a4a4a', '#2e2e2e', '#5a5a5a', '#252525'] },
      manila: { colors: ['#e8c96a', '#dd8f5e', '#8fb5a3', '#e2cf8f', '#b58fb5'] },
    };
    // Photo mode ties the tab/back to a tone pulled from each city's own
    // photo, so the folder reads as part of the picture instead of an
    // arbitrary palette swatch behind it. The Palette picker is disabled
    // while a decal is showing, since it would otherwise fight this.
    const PHOTO_COLORS = {
      'tokyo': '#13303f',
      'nairobi': '#75754f',
      'sao-paulo': '#8a7259',
      'copenhagen': '#4f6b7c',
      'mexico-city': '#3d7dae',
    };
    const CITIES = [
      { label: 'Tokyo',       slug: 'tokyo',       flower: 'Sakura',     flowerImg: 'sakura',
        fact: 'The largest metro area on earth: about 37 million people.' },
      { label: 'Nairobi',     slug: 'nairobi',     flower: 'Orchid',     flowerImg: 'orchid',
        fact: 'The only capital city with a national park inside its limits.' },
      { label: 'São Paulo',   slug: 'sao-paulo',   flower: 'Ipê',        flowerImg: 'ipe',
        fact: 'The largest Portuguese speaking city in the world.' },
      { label: 'Copenhagen',  slug: 'copenhagen',  flower: 'Marguerite', flowerImg: 'marguerite',
        fact: 'Bikes outnumber cars in the city center.' },
      { label: 'Mexico City', slug: 'mexico-city', flower: 'Dahlia',     flowerImg: 'dahlia',
        fact: 'Built on a drained lake bed, and still slowly sinking.' },
    ];

    let currentTheme = 'light';
    let currentMode = 'stack';
    let currentPalette = 'manila';
    let contentMode = 'labels'; // 'labels' | 'photos'
    let peekOn = false;

    function peekPair(c) {
      return `<div class="peek-pair">
        <figure class="pol pol--img">
          <img src="./photos/flowers/${c.flowerImg}.jpg" alt="${c.flower}">
          <figcaption>${c.flower}</figcaption>
        </figure>
        <div class="pol pol--fact">
          <h4>${c.label}</h4>
          <p>${c.fact}</p>
        </div>
      </div>`;
    }

    function buildItems() {
      const p = PALETTES[currentPalette];
      return CITIES.map((c, i) => {
        const color = contentMode === 'photos' ? PHOTO_COLORS[c.slug] : p.colors[i % p.colors.length];
        const base = { label: c.label, color };
        if (contentMode === 'photos') base.decal = `./photos/${c.slug}.jpg`;
        // Folders are empty until Peek is on; the peek pair is the contents.
        if (peekOn) base.content = peekPair(c);
        return base;
      });
    }

    function rebuild() { fg.items = buildItems(); requestAnimationFrame(fit); }

    /* ── sandbox fit: scale the stage to the viewport ──
       Stack and carousel scale to fit BOTH axes so nothing scrolls. Grid can
       run several rows tall; shrinking it to fit the height would leave the
       folders tiny, so grid scales to WIDTH only and the viewport scrolls
       vertically instead. */
    function fit() {
      const grid = currentMode === 'grid';
      const pad = 36;
      const peekHeadroom = peekOn ? 110 : 20;
      const needW = fg.offsetWidth + pad;
      const needH = fg.offsetHeight + pad + peekHeadroom;
      const c = viewport.getBoundingClientRect();
      const scale = grid
        ? Math.min(1, c.width / needW)
        : Math.min(1, c.width / needW, (c.height - 44) / needH);
      viewport.classList.toggle('is-scroll', grid);
      // Top-origin in scroll mode so the first row sits at the top; transforms
      // don't shrink the layout box, so reclaim the leftover height (when
      // scaled down) or the scroll area would run past the last row.
      stage.style.transformOrigin = grid ? 'top center' : 'center center';
      stage.style.transform = `scale(${scale.toFixed(3)})`;
      stage.style.marginBottom = grid && scale < 1
        ? `${-fg.offsetHeight * (1 - scale)}px`
        : '';
    }
    new ResizeObserver(() => fit()).observe(canvas);
    fg.addEventListener('fg-modechange', () => setTimeout(fit, 60));

    /* ── control rail: draggable + resizable ──
       Dragging only ever changes .panel's width. The canvas is flex:1, so
       it (and the gallery inside it) shrinks or grows to fill whatever
       .panel gives up - the ResizeObserver above already watches .canvas
       and re-fits on every change, dragged or not. */
    const PANEL_MIN = 160;
    // Cap the drag so the canvas - where the gallery actually lives -
    // never drops below 20% of the viewport width. Recomputed on every
    // drag frame (not a fixed px cap) since "20vw" moves with the window.
    const RESIZE_HANDLE_W = 5;
    function panelMaxWidth() {
      return Math.max(PANEL_MIN, window.innerWidth * 0.8 - RESIZE_HANDLE_W);
    }
    function setPanelWidth(px) {
      panel.style.width = `${Math.min(panelMaxWidth(), Math.max(PANEL_MIN, px))}px`;
    }
    let dragStartX = 0;
    let dragStartW = 0;
    function onDragMove(e) {
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      setPanelWidth(dragStartW + (x - dragStartX));
    }
    function onDragEnd() {
      panelResize.classList.remove('is-dragging');
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
    }
    panelResize.addEventListener('pointerdown', (e) => {
      if (matchMedia('(max-width: 860px)').matches) return; // rail is stacked, nothing to drag
      dragStartX = e.clientX;
      dragStartW = panel.getBoundingClientRect().width;
      panelResize.classList.add('is-dragging');
      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragEnd);
      e.preventDefault();
    });
    // Keyboard: focus the handle (it's a role="separator"), arrows resize.
    panelResize.addEventListener('keydown', (e) => {
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      e.preventDefault();
      const step = e.key === 'ArrowRight' ? 16 : -16;
      setPanelWidth(panel.getBoundingClientRect().width + step);
    });

    /* ── live API readout ── */
    function updateReadout() {
      const peekVal = peekOn ? (matchMedia('(hover: hover)').matches ? 'hover' : 'always') : 'off';
      const opts = [`mode: '${currentMode}'`, `peek: '${peekVal}'`];
      readout.textContent = `createFolderGallery(el, { items, ${opts.join(', ')} })  ·  data-fg-theme="${currentTheme}"`;
    }
    readout.addEventListener('click', () => {
      navigator.clipboard && navigator.clipboard.writeText(readout.textContent);
    });

    function setTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      fg.setAttribute('data-fg-theme', theme);
      if (theme === 'light' && currentPalette !== 'manila') setPalette('manila');
      if (theme === 'dark' && currentPalette === 'manila') setPalette('studio');
      updateReadout();
    }
    function setPalette(name) {
      currentPalette = name;
      rebuild();
      activate('[aria-label="Palette"]', document.querySelector(`[data-palette="${name}"]`));
    }
    function activate(groupSel, el) {
      document.querySelectorAll(`${groupSel} button`).forEach((b) => b.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    rebuild();
    updateReadout();
    fg.addEventListener('fg-select', (e) => console.log('fg-select', e.detail.item.label, e.detail.index));

    document.querySelectorAll('[data-theme-pick]').forEach((b) => {
      b.addEventListener('click', () => { setTheme(b.dataset.themePick); activate('[aria-label="Theme"]', b); });
    });
    document.querySelectorAll('[data-mode]').forEach((b) => {
      b.addEventListener('click', () => {
        currentMode = b.dataset.mode;
        fg.setMode(currentMode);
        activate('[aria-label="View mode"]', b);
        updateReadout();
      });
    });
    const paletteGroup = document.getElementById('paletteGroup');
    document.querySelectorAll('[data-content]').forEach((b) => {
      b.addEventListener('click', () => {
        contentMode = b.dataset.content;
        rebuild();
        document.querySelectorAll('[data-content]').forEach((x) => x.classList.toggle('active', x === b));
        paletteGroup.classList.toggle('is-disabled', contentMode === 'photos');
      });
    });
    const peekBtn = document.getElementById('peekBtn');
    const canHover = matchMedia('(hover: hover)').matches;
    const keysEl = document.querySelector('.keys');
    const keysDefault = keysEl.innerHTML;
    peekBtn.addEventListener('click', () => {
      peekOn = !peekOn;
      rebuild(); // folders are empty until Peek adds the flower + fact pair
      // Like the portfolio: peek rides the pointer. Touch gets always-out.
      fg.setPeek(peekOn ? (canHover ? 'hover' : 'always') : 'off');
      peekBtn.classList.toggle('active', peekOn);
      keysEl.innerHTML = peekOn && canHover
        ? 'hover the folders to peek inside'
        : keysDefault;
      updateReadout();
    });
    document.querySelectorAll('[data-palette]').forEach((b) => {
      b.addEventListener('click', () => setPalette(b.dataset.palette));
    });
  </script>
</body>
</html>
