<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flipfolio playground</title>
  <link rel="stylesheet" href="../src/folder-gallery.css">
  <style>
    * { box-sizing: border-box; }
    :root[data-theme='dark'] {
      color-scheme: dark;
      --page-bg: radial-gradient(1200px 600px at 50% -10%, #1c2230, #101216 60%);
      --page-fg: #e9e9e6;
      --page-muted: #a7adb8;
      --page-faint: #7c828d;
      --chip-bg: #191d24;
      --chip-border: #2a2f38;
      --chip-fg: #cfd3da;
      --chip-hover: #232833;
      --chip-active-bg: #e9e9e6;
      --chip-active-fg: #14161a;
      --kbd-bg: #20242c;
      --kbd-border: #333;
    }
    :root[data-theme='light'] {
      color-scheme: light;
      --page-bg: radial-gradient(1200px 600px at 50% -10%, #faf8f2, #f3f1ec 60%);
      --page-fg: #1c1c1a;
      --page-muted: #4a463e;
      --page-faint: #8a857a;
      --chip-bg: #ffffff;
      --chip-border: #d8d4c8;
      --chip-fg: #3a3830;
      --chip-hover: #eceade;
      --chip-active-bg: #1c1c1a;
      --chip-active-fg: #f3f1ec;
      --kbd-bg: #eceade;
      --kbd-border: #c9c4b4;
    }
    body {
      margin: 0; min-height: 100vh;
      background: var(--page-bg);
      color: var(--page-fg);
      font: 15px/1.55 ui-sans-serif, system-ui, sans-serif;
      transition: background .3s, color .3s;
    }
    main { max-width: 960px; margin: 0 auto; padding: 3.5rem 1.25rem 5rem; text-align: center; }
    h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 .35rem; letter-spacing: -.02em; }
    .tagline { color: var(--page-muted); margin: 0 auto 2rem; max-width: 46ch; }
    .controls { display: flex; flex-wrap: wrap; gap: 1.25rem; justify-content: center; margin-bottom: 2.5rem; }
    .group { display: inline-flex; gap: .4rem; padding: .3rem; background: var(--chip-bg); border: 1px solid var(--chip-border); border-radius: 999px; }
    .group > span { align-self: center; color: var(--page-faint); font-size: .78rem; padding: 0 .5rem 0 .7rem; }
    .group button {
      background: transparent; color: var(--chip-fg); border: 0; cursor: pointer;
      padding: .45rem .85rem; border-radius: 999px; font: inherit; transition: background .15s, color .15s;
    }
    .group button:hover { background: var(--chip-hover); }
    .group button.active { background: var(--chip-active-bg); color: var(--chip-active-fg); }
    folder-gallery { margin-top: 1rem; min-height: 460px; }
    .hint { color: var(--page-faint); font-size: .85rem; margin-top: 2rem; }
    .hint kbd { background: var(--kbd-bg); border: 1px solid var(--kbd-border); border-bottom-width: 2px; border-radius: 4px; padding: .05em .4em; }

    /* ── peek contents: a flower polaroid + a city fact card ──
       Paper stays paper in both themes, like prints pulled from a folder. */
    #fg.fg-root { --fg-peek-shift: -64%; }
    folder-gallery .fg-content { overflow: visible; }
    .peek-pair {
      display: flex; gap: 16px; align-items: center; justify-content: center;
      width: 100%; height: 100%;
    }
    .pol {
      background: #fdfcf9; border-radius: 5px; padding: 8px;
      box-shadow: 0 14px 30px rgba(20, 20, 20, 0.28);
    }
    .pol--img { width: 42%; transform: rotate(-4deg); }
    .pol--img img { width: 100%; aspect-ratio: 5/4; object-fit: cover; display: block; border-radius: 3px; }
    .pol--img figcaption {
      font-size: .78rem; font-weight: 600; color: #3a3830;
      text-align: center; padding-top: 6px;
    }
    .pol--fact { width: 46%; transform: rotate(3deg); padding: 14px 16px; text-align: left; }
    .pol--fact h4 { font-size: .95rem; color: #1c1c1a; margin: 0 0 6px; }
    .pol--fact p { font-size: .82rem; line-height: 1.5; color: #55503f; margin: 0; }
  </style>
</head>
<body>
  <main>
    <h1>flipfolio</h1>
    <p class="tagline">A 3D folder gallery that holds <em>real content</em>. Stack, grid, and carousel modes; keyboard, wheel, and touch; themeable; accessible.</p>

    <div class="controls">
      <div class="group" role="group" aria-label="Theme">
        <span>Theme</span>
        <button data-theme-pick="light" class="active">Light</button>
        <button data-theme-pick="dark">Dark</button>
      </div>
      <div class="group" role="group" aria-label="View mode">
        <span>View</span>
        <button data-mode="stack" class="active">Stack</button>
        <button data-mode="grid">Grid</button>
        <button data-mode="carousel">Carousel</button>
      </div>
      <div class="group" role="group" aria-label="Content">
        <span>Content</span>
        <button data-content="labels" class="active">Labels</button>
        <button data-content="photos">Photos</button>
        <button id="peekBtn">Peek</button>
      </div>
      <div class="group" role="group" aria-label="Palette">
        <span>Palette</span>
        <button data-palette="studio">Studio</button>
        <button data-palette="warm">Warm</button>
        <button data-palette="mono">Mono</button>
        <button data-palette="manila" class="active">Manila</button>
      </div>
    </div>

    <folder-gallery id="fg" mode="stack" data-fg-theme="light" label="Global cities"></folder-gallery>

    <p class="hint">Hover the stack and use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or your scroll wheel. Click the front folder to select it.</p>
  </main>

  <script type="module">
    import { defineFolderGallery } from '../src/folder-gallery-element.js';
    defineFolderGallery();

    const fg = document.getElementById('fg');

    /* Each palette carries its own content ink so folder interiors stay
       readable on light and dark folder colors alike. */
    const PALETTES = {
      studio: { ink: '#eeeeee', colors: ['#2a3a3a', '#3d2e42', '#2a2d3e', '#3a3d2f', '#4a3030'] },
      warm:   { ink: '#f2e8de', colors: ['#4a3030', '#5a3d2a', '#5a4a2a', '#4a2e42', '#3d2f2f'] },
      mono:   { ink: '#e8e8e8', colors: ['#3a3a3a', '#4a4a4a', '#2e2e2e', '#5a5a5a', '#252525'] },
      manila: { ink: '#3a3428', colors: ['#e8c96a', '#dd8f5e', '#8fb5a3', '#e2cf8f', '#b58fb5'] },
    };
    const CITIES = [
      { label: 'Tokyo',       slug: 'tokyo',       flower: 'Sakura',     flowerImg: 'sakura',
        fact: 'The largest metro area on earth: about 37 million people.' },
      { label: 'Nairobi',     slug: 'nairobi',     flower: 'Orchid',     flowerImg: 'orchid',
        fact: 'The only capital city with a national park inside its limits.' },
      { label: 'São Paulo',   slug: 'sao-paulo',   flower: 'Ipê',        flowerImg: 'ipe',
        fact: 'The largest Portuguese speaking city in the world.' },
      { label: 'Copenhagen',  slug: 'copenhagen',  flower: 'Marguerite', flowerImg: 'marguerite',
        fact: 'Bikes outnumber cars in the city center.' },
      { label: 'Mexico City', slug: 'mexico-city', flower: 'Dahlia',     flowerImg: 'dahlia',
        fact: 'Built on a drained lake bed, and still slowly sinking.' },
    ];

    let currentPalette = 'manila';
    let contentMode = 'labels'; // 'labels' | 'photos'
    let peekOn = false;

    function peekPair(c) {
      // Portfolio-style pair pulled from the folder: a flower polaroid and a
      // city fact card.
      return `<div class="peek-pair">
        <figure class="pol pol--img">
          <img src="./photos/flowers/${c.flowerImg}.jpg" alt="${c.flower}">
          <figcaption>${c.flower}</figcaption>
        </figure>
        <div class="pol pol--fact">
          <h4>${c.label}</h4>
          <p>${c.fact}</p>
        </div>
      </div>`;
    }

    function buildItems() {
      const p = PALETTES[currentPalette];
      return CITIES.map((c, i) => {
        const base = { label: c.label, color: p.colors[i % p.colors.length] };
        if (contentMode === 'photos') base.decal = `./photos/${c.slug}.jpg`;
        // Folders are empty until Peek is on; the peek pair is the contents.
        if (peekOn) base.content = peekPair(c);
        return base;
      });
    }

    function rebuild() { fg.items = buildItems(); }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      fg.setAttribute('data-fg-theme', theme);
      // Nudge the palette to the natural pairing when the user hasn't
      // picked one that already suits the theme.
      if (theme === 'light' && currentPalette !== 'manila') setPalette('manila');
      if (theme === 'dark' && currentPalette === 'manila') setPalette('studio');
    }

    function setPalette(name) {
      currentPalette = name;
      rebuild();
      activate('[aria-label="Palette"]', document.querySelector(`[data-palette="${name}"]`));
    }

    function activate(groupSel, el) {
      document.querySelectorAll(`${groupSel} button`).forEach((b) => b.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    rebuild();
    fg.addEventListener('fg-select', (e) => console.log('fg-select', e.detail.item.label, e.detail.index));
    fg.addEventListener('fg-modechange', (e) => console.log('fg-modechange', e.detail.mode));

    document.querySelectorAll('[data-theme-pick]').forEach((b) => {
      b.addEventListener('click', () => {
        setTheme(b.dataset.themePick);
        activate('[aria-label="Theme"]', b);
      });
    });
    document.querySelectorAll('[data-mode]').forEach((b) => {
      b.addEventListener('click', () => { fg.setMode(b.dataset.mode); activate('[aria-label="View mode"]', b); });
    });
    document.querySelectorAll('[data-content]').forEach((b) => {
      b.addEventListener('click', () => {
        contentMode = b.dataset.content;
        rebuild();
        document.querySelectorAll('[data-content]').forEach((x) => x.classList.toggle('active', x === b));
      });
    });
    const peekBtn = document.getElementById('peekBtn');
    peekBtn.addEventListener('click', () => {
      peekOn = !peekOn;
      rebuild(); // folders are empty until Peek adds the flower + fact pair
      fg.setPeek(peekOn ? 'always' : 'off');
      peekBtn.classList.toggle('active', peekOn);
    });
    document.querySelectorAll('[data-palette]').forEach((b) => {
      b.addEventListener('click', () => setPalette(b.dataset.palette));
    });
  </script>
</body>
</html>
