<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>showcase: three modes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600&family=Fragment+Mono&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/folder-gallery.css">
  <style>
    /* System shell shared with docs/mockup.html: cool paper, teal mesh,
       frosted sharp sheet, dot grid, Unbounded + Fragment Mono. */
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 2100px; height: 860px; overflow: hidden; }
    body {
      background: #F0F4F2;
      color: rgba(0, 0, 0, 0.85);
      font: 16px/1.5 'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif;
      position: relative;
    }
    .mesh {
      position: absolute; inset: -15%;
      background:
        radial-gradient(44% 58% at 14% 18%, rgba(126, 202, 202, 0.55), transparent 70%),
        radial-gradient(40% 52% at 86% 14%, rgba(46, 106, 92, 0.26), transparent 70%),
        radial-gradient(48% 62% at 82% 86%, rgba(179, 232, 232, 0.5), transparent 70%),
        radial-gradient(42% 56% at 16% 88%, rgba(20, 69, 60, 0.15), transparent 70%),
        radial-gradient(60% 70% at 50% 50%, #F0F4F2, #E4ECE8);
      filter: blur(60px) saturate(1.02);
    }
    .sheet {
      position: absolute; inset: 36px 40px;
      background: rgba(240, 244, 242, 0.55);
      backdrop-filter: blur(24px) saturate(1.1);
      -webkit-backdrop-filter: blur(24px) saturate(1.1);
      border: 1px solid rgba(18, 40, 30, 0.22);
      box-shadow: 0 24px 60px rgba(18, 40, 30, 0.14);
      overflow: hidden;
    }
    .sheet::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(18, 40, 30, 0.10) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }
    header { text-align: center; padding-top: 52px; position: relative; z-index: 2; }
    h2 { font-family: 'Unbounded', sans-serif; font-size: 44px; font-weight: 600; letter-spacing: -0.01em; }
    h2 b { color: #14453C; }
    header p { color: rgba(0, 0, 0, 0.6); font-size: 19px; margin-top: 12px; }
    header code {
      font: 15px/1 'Fragment Mono', monospace;
      background: rgba(18, 40, 30, 0.06);
      border: 1px solid rgba(18, 40, 30, 0.18);
      padding: 3px 9px;
    }
    .row { display: flex; justify-content: center; align-items: flex-end; gap: 48px; margin-top: 8px; position: relative; z-index: 2; }
    .panel { display: flex; flex-direction: column; align-items: center; }
    /* Common floor: every gallery bottom-anchors in a fixed well so the
       captions line up across panels regardless of scene height. */
    .well { height: 520px; display: flex; align-items: flex-end; }
    .panel .cap { margin-top: 18px; font-size: 18px; font-weight: 600; }
    .panel .sub { color: rgba(0, 0, 0, 0.55); font: 13px/1.5 'Fragment Mono', monospace; margin-top: 4px; }
    .fg-root { --fg-transition-transform: 1ms; --fg-transition-fade: 1ms; }
    .fg-dots { display: none; }
    .panel-stack .fg-scene { height: 440px; }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div class="sheet">
    <header>
      <h2>Three modes, one items array<b>.</b></h2>
      <p>Switch at runtime with <code>setMode()</code>. The cards animate between layouts; nothing re-renders.</p>
    </header>
    <div class="row">
      <div class="panel panel-stack">
        <div class="well"><div id="fg-stack"></div></div>
        <div class="cap">Stack</div>
        <div class="sub">scroll or arrow through the pile</div>
      </div>
      <div class="panel">
        <div class="well"><div id="fg-grid"></div></div>
        <div class="cap">Grid</div>
        <div class="sub">the overview, every folder at once</div>
      </div>
      <div class="panel">
        <div class="well"><div id="fg-carousel"></div></div>
        <div class="cap">Carousel</div>
        <div class="sub">neighbors recede on both sides</div>
      </div>
    </div>
  </div>
  <script type="module">
    import { createFolderGallery } from '../../src/folder-gallery.js';
    const items = [
      { label: 'Tokyo',       color: '#2a3a3a', content: '<div style="font-weight:600;color:#eee">Tokyo</div>' },
      { label: 'Nairobi',     color: '#3d2e42', content: '<div style="font-weight:600;color:#eee">Nairobi</div>' },
      { label: 'São Paulo',   color: '#2a2d3e', content: '<div style="font-weight:600;color:#eee">São Paulo</div>' },
      { label: 'Copenhagen',  color: '#3a3d2f', content: '<div style="font-weight:600;color:#eee">Copenhagen</div>' },
      { label: 'Mexico City', color: '#4a3030', content: '<div style="font-weight:600;color:#eee">Mexico City</div>' },
    ];
    for (const [id, mode, activeIdx] of [['fg-stack', 'stack', 0], ['fg-grid', 'grid', 1], ['fg-carousel', 'carousel', 2]]) {
      createFolderGallery(document.getElementById(id), {
        items, mode, defaultActiveIndex: activeIdx, reducedMotion: 'force', drag: 'off',
      });
    }
  </script>
</body>
</html>
