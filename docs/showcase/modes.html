<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>showcase: three modes</title>
  <link rel="stylesheet" href="../../src/folder-gallery.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 2100px; height: 860px; overflow: hidden; }
    body {
      background: radial-gradient(1600px 700px at 50% -10%, #1c2230, #101216 60%);
      color: #e9e9e6;
      font: 16px/1.5 ui-sans-serif, system-ui, "Helvetica Neue", sans-serif;
    }
    header { text-align: center; padding-top: 64px; }
    h2 { font-size: 52px; font-weight: 750; letter-spacing: -0.03em; }
    header p { color: #a7adb8; font-size: 20px; margin-top: 10px; }
    header code { font: 17px/1 ui-monospace, monospace; background: #20242c; padding: 3px 9px; border-radius: 6px; }
    .row { display: flex; justify-content: center; align-items: flex-end; gap: 48px; margin-top: 24px; }
    .panel { display: flex; flex-direction: column; align-items: center; }
    /* Common floor: every gallery bottom-anchors in a fixed well so the
       captions line up across panels regardless of scene height. */
    .well { height: 560px; display: flex; align-items: flex-end; }
    .panel .cap { margin-top: 18px; font-size: 19px; font-weight: 650; }
    .panel .sub { color: #7c828d; font-size: 15px; margin-top: 4px; }
    .fg-root { --fg-transition-transform: 1ms; --fg-transition-fade: 1ms; }
    .fg-dots { display: none; }
    .panel-stack .fg-scene { height: 440px; }
  </style>
</head>
<body>
  <header>
    <h2>Three modes, one items array</h2>
    <p>Switch at runtime with <code>setMode()</code>. The cards animate between layouts; nothing re-renders.</p>
  </header>
  <div class="row">
    <div class="panel panel-stack">
      <div class="well"><div id="fg-stack"></div></div>
      <div class="cap">Stack</div>
      <div class="sub">scroll or arrow through the pile</div>
    </div>
    <div class="panel">
      <div class="well"><div id="fg-grid"></div></div>
      <div class="cap">Grid</div>
      <div class="sub">the overview, every folder at once</div>
    </div>
    <div class="panel">
      <div class="well"><div id="fg-carousel"></div></div>
      <div class="cap">Carousel</div>
      <div class="sub">neighbors recede on both sides</div>
    </div>
  </div>
  <script type="module">
    import { createFolderGallery } from '../../src/folder-gallery.js';
    const items = [
      { label: 'Tokyo',       color: '#2a3a3a', content: '<div style="font-weight:600;color:#eee">Tokyo</div>' },
      { label: 'Nairobi',     color: '#3d2e42', content: '<div style="font-weight:600;color:#eee">Nairobi</div>' },
      { label: 'São Paulo',   color: '#2a2d3e', content: '<div style="font-weight:600;color:#eee">São Paulo</div>' },
      { label: 'Copenhagen',  color: '#3a3d2f', content: '<div style="font-weight:600;color:#eee">Copenhagen</div>' },
      { label: 'Mexico City', color: '#4a3030', content: '<div style="font-weight:600;color:#eee">Mexico City</div>' },
    ];
    for (const [id, mode, activeIdx] of [['fg-stack', 'stack', 0], ['fg-grid', 'grid', 1], ['fg-carousel', 'carousel', 2]]) {
      createFolderGallery(document.getElementById(id), {
        items, mode, defaultActiveIndex: activeIdx, reducedMotion: 'force',
      });
    }
  </script>
</body>
</html>
