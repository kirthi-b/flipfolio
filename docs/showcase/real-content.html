<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>showcase: real content</title>
  <link rel="stylesheet" href="../../src/folder-gallery.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 1600px; height: 900px; overflow: hidden; }
    body {
      background: #f3f1ec;
      color: #1c1c1a;
      font: 16px/1.5 ui-sans-serif, system-ui, "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
    }
    .rail { flex: 0 0 420px; padding-left: 84px; }
    h2 { font-size: 52px; font-weight: 750; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 18px; }
    .rail p { font-size: 20px; line-height: 1.5; color: #4a463e; max-width: 26ch; }
    .rail code {
      display: inline-block; margin-top: 22px; font: 15px/1.6 ui-monospace, monospace;
      background: #eceade; border: 1px solid #d8d4c8; border-radius: 8px; padding: 12px 16px;
      color: #3a3830; text-align: left;
    }
    .stage { flex: 1; display: flex; justify-content: center; padding-top: 150px; }
    .stage .fg-root { --fg-transition-transform: 1ms; --fg-transition-fade: 1ms; }
    .stage .fg-dots { display: none; }
    /* Pull each photo up out of its folder, like a print being lifted out.
       Inset from the left so the folder tabs stay visible. */
    .stage .fg-content {
      top: -34%; bottom: 48%; left: 22%; right: 6%;
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(30, 30, 30, 0.22);
      background: #fff; padding: 5px;
    }
    /* Poster still: solid fronts everywhere, no frost smear over the photos. */
    .stage .fg-card .fg-front {
      background: var(--fg-front-solid);
      backdrop-filter: none; -webkit-backdrop-filter: none;
      box-shadow: var(--fg-inset-highlight);
    }
  </style>
</head>
<body>
  <div class="rail">
    <h2>Real<br>content</h2>
    <p>Every folder holds what you put in it. These are project images, loaded with <b>item.src</b>.</p>
    <code>{ label: 'Diversity',<br>&nbsp;&nbsp;color: '#8fb5a3',<br>&nbsp;&nbsp;src: '/img/diversity.png' }</code>
  </div>
  <div class="stage">
    <div id="fg" data-fg-theme="light"></div>
  </div>
  <script type="module">
    import { createFolderGallery } from '../../src/folder-gallery.js';
    const items = [
      { label: 'CV Ethnography',  color: '#dd8f5e', src: 'https://kirthi.studio/images/projects/cv-ethnography.png' },
      { label: 'Diversity',       color: '#8fb5a3', src: 'https://kirthi.studio/images/projects/diversity.png' },
      { label: 'Mobility Index',  color: '#e8c96a', src: 'https://kirthi.studio/images/projects/mobility.png' },
      { label: 'CitiBike Flows',  color: '#b58fb5', src: 'https://kirthi.studio/images/projects/citibike/august.png' },
      { label: 'QoL for Children',color: '#e2cf8f', src: 'https://kirthi.studio/images/projects/qol-children/qol-1.png' },
      { label: 'Rideshare Equity',color: '#94a7c4', src: 'https://kirthi.studio/images/projects/chicago-rideshare/INCOME_Pickup.png' },
    ];
    createFolderGallery(document.getElementById('fg'), { items, mode: 'grid', reducedMotion: 'force' });
  </script>
</body>
</html>
