<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>showcase: make it yours</title>
  <link rel="stylesheet" href="../../src/folder-gallery.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 1760px; height: 820px; overflow: hidden; }
    body {
      background: #f3f1ec;
      color: #1c1c1a;
      font: 16px/1.5 ui-sans-serif, system-ui, "Helvetica Neue", sans-serif;
    }
    header { text-align: center; padding-top: 60px; }
    h2 { font-size: 52px; font-weight: 750; letter-spacing: -0.03em; }
    header p { color: #4a463e; font-size: 20px; margin-top: 10px; }
    header code { font: 17px/1 ui-monospace, monospace; background: #eceade; padding: 3px 9px; border-radius: 6px; }
    .row { display: flex; justify-content: center; gap: 48px; margin-top: 90px; }
    .mini { display: flex; flex-direction: column; align-items: center; }
    .mini .fg-scene { width: 420px !important; height: 410px; }
    .mini .fg-dots { display: none; }
    .fg-root { --fg-transition-transform: 1ms; --fg-transition-fade: 1ms; }
    .mini .cap { margin-top: 2px; font-size: 18px; font-weight: 650; }
    .mini .sub { margin-top: 5px; font: 14px/1.5 ui-monospace, monospace; color: #8a857a; text-align: center; }
    /* Per-panel token overrides: this is the demo. */
    #c2 { --fg-radius: 4px; --fg-active-blur: 0px; }
    #c3 { --fg-radius: 26px; --fg-active-blur: 18px; }
    .note { font-weight: 600; padding: 1rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h2>Make it yours</h2>
    <p>Tab color per folder, tokens for radius, blur, and easing. The silhouette itself is one SVG path: <code>folderPath</code>.</p>
  </header>
  <div class="row">
    <div class="mini">
      <div id="c1" data-fg-theme="light"></div>
      <div class="cap">Default tab</div>
      <div class="sub">the built-in manila silhouette</div>
    </div>
    <div class="mini">
      <div id="c2" data-fg-theme="light"></div>
      <div class="cap">Right tab, sharp</div>
      <div class="sub">custom folderPath, --fg-radius: 4px, no blur</div>
    </div>
    <div class="mini">
      <div id="c3" data-fg-theme="light"></div>
      <div class="cap">Tabless tray, soft</div>
      <div class="sub">custom folderPath, --fg-radius: 26px, blur 18px</div>
    </div>
  </div>
  <script type="module">
    import { createFolderGallery } from '../../src/folder-gallery.js';

    /* The default path mirrored across the vertical center: tab on the right. */
    const RIGHT_TAB =
      'M 480 22 C 480 10 470 0 458 0 L 325 0 C 312 0 308 6 304 14 C 300 24 292 32 276 32 ' +
      'L 22 32 C 10 32 0 42 0 54 L 0 320 C 0 332 10 342 22 342 L 458 342 C 470 342 480 332 480 320 Z';

    /* No tab at all: a plain rounded tray. */
    const TRAY =
      'M 0 54 C 0 42 10 32 22 32 L 458 32 C 470 32 480 42 480 54 ' +
      'L 480 320 C 480 332 470 342 458 342 L 22 342 C 10 342 0 332 0 320 Z';

    /* Empty folders: this poster is about silhouettes and tokens, and bare
       fronts keep the shapes crisp. */
    const mk = (id, colors, folderPath) => createFolderGallery(document.getElementById(id), {
      items: [
        { label: 'Alpha', color: colors[0] },
        { label: 'Beta',  color: colors[1] },
        { label: 'Gamma', color: colors[2] },
      ],
      mode: 'stack', reducedMotion: 'force',
      ...(folderPath ? { folderPath } : {}),
    });

    mk('c1', ['#e8c96a', '#e2cf8f', '#d8b45c']);
    mk('c2', ['#dd8f5e', '#c97b4e', '#b06a42'], RIGHT_TAB);
    mk('c3', ['#8fb5a3', '#7ba390', '#6a927f'], TRAY);
  </script>
</body>
</html>
