<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>showcase: make it yours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600&family=Fragment+Mono&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/folder-gallery.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 1760px; height: 820px; overflow: hidden; }
    body {
      background: #F0F4F2;
      color: rgba(0, 0, 0, 0.85);
      font: 16px/1.5 'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif;
      position: relative;
    }
    .mesh {
      position: absolute; inset: -15%;
      background:
        radial-gradient(44% 58% at 14% 18%, rgba(126, 202, 202, 0.55), transparent 70%),
        radial-gradient(40% 52% at 86% 14%, rgba(46, 106, 92, 0.26), transparent 70%),
        radial-gradient(48% 62% at 82% 86%, rgba(179, 232, 232, 0.5), transparent 70%),
        radial-gradient(42% 56% at 16% 88%, rgba(20, 69, 60, 0.15), transparent 70%),
        radial-gradient(60% 70% at 50% 50%, #F0F4F2, #E4ECE8);
      filter: blur(60px) saturate(1.02);
    }
    .sheet {
      position: absolute; inset: 36px 40px;
      background: rgba(240, 244, 242, 0.55);
      backdrop-filter: blur(24px) saturate(1.1);
      -webkit-backdrop-filter: blur(24px) saturate(1.1);
      border: 1px solid rgba(18, 40, 30, 0.22);
      box-shadow: 0 24px 60px rgba(18, 40, 30, 0.14);
      overflow: hidden;
    }
    .sheet::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(18, 40, 30, 0.10) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }
    header { text-align: center; padding-top: 48px; position: relative; z-index: 2; }
    h2 { font-family: 'Unbounded', sans-serif; font-size: 44px; font-weight: 600; letter-spacing: -0.01em; }
    h2 b { color: #14453C; }
    header p { color: rgba(0, 0, 0, 0.6); font-size: 19px; margin-top: 12px; }
    header code {
      font: 15px/1 'Fragment Mono', monospace;
      background: rgba(18, 40, 30, 0.06);
      border: 1px solid rgba(18, 40, 30, 0.18);
      padding: 3px 9px;
    }
    .row { display: flex; justify-content: center; gap: 48px; margin-top: 76px; position: relative; z-index: 2; }
    .mini { display: flex; flex-direction: column; align-items: center; }
    .mini .fg-scene { width: 420px !important; height: 410px; }
    .mini .fg-dots { display: none; }
    .fg-root { --fg-transition-transform: 1ms; --fg-transition-fade: 1ms; }
    .mini .cap { margin-top: 2px; font-size: 18px; font-weight: 600; }
    .mini .sub { margin-top: 5px; font: 13px/1.5 'Fragment Mono', monospace; color: rgba(0, 0, 0, 0.55); text-align: center; }
    /* Per-panel token overrides: this is the demo. */
    #c2 { --fg-radius: 4px; --fg-active-blur: 0px; }
    #c3 { --fg-radius: 26px; --fg-active-blur: 18px; }
    .note { font-weight: 600; padding: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div class="sheet">
  <header>
    <h2>Make it yours<b>.</b></h2>
    <p>Tab color per folder, tokens for radius, blur, and easing. The silhouette itself is one SVG path: <code>folderPath</code>.</p>
  </header>
  <div class="row">
    <div class="mini">
      <div id="c1" data-fg-theme="light"></div>
      <div class="cap">Default tab</div>
      <div class="sub">the built-in manila silhouette</div>
    </div>
    <div class="mini">
      <div id="c2" data-fg-theme="light"></div>
      <div class="cap">Right tab, sharp</div>
      <div class="sub">custom folderPath, --fg-radius: 4px, no blur</div>
    </div>
    <div class="mini">
      <div id="c3" data-fg-theme="light"></div>
      <div class="cap">Tabless tray, soft</div>
      <div class="sub">custom folderPath, --fg-radius: 26px, blur 18px</div>
    </div>
  </div>
  </div>
  <script type="module">
    import { createFolderGallery } from '../../src/folder-gallery.js';

    /* The default path mirrored across the vertical center: tab on the right. */
    const RIGHT_TAB =
      'M 480 22 C 480 10 470 0 458 0 L 325 0 C 312 0 308 6 304 14 C 300 24 292 32 276 32 ' +
      'L 22 32 C 10 32 0 42 0 54 L 0 320 C 0 332 10 342 22 342 L 458 342 C 470 342 480 332 480 320 Z';

    /* No tab at all: a plain rounded tray. */
    const TRAY =
      'M 0 54 C 0 42 10 32 22 32 L 458 32 C 470 32 480 42 480 54 ' +
      'L 480 320 C 480 332 470 342 458 342 L 22 342 C 10 342 0 332 0 320 Z';

    /* Empty folders: this poster is about silhouettes and tokens, and bare
       fronts keep the shapes crisp. */
    const mk = (id, colors, folderPath) => createFolderGallery(document.getElementById(id), {
      items: [
        { label: 'Alpha', color: colors[0] },
        { label: 'Beta',  color: colors[1] },
        { label: 'Gamma', color: colors[2] },
      ],
      mode: 'stack', reducedMotion: 'force',
      ...(folderPath ? { folderPath } : {}),
    });

    mk('c1', ['#e8c96a', '#e2cf8f', '#d8b45c']);
    mk('c2', ['#dd8f5e', '#c97b4e', '#b06a42'], RIGHT_TAB);
    mk('c3', ['#8fb5a3', '#7ba390', '#6a927f'], TRAY);
  </script>
</body>
</html>
