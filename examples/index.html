<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flipfolio example</title>
  <link rel="stylesheet" href="../src/folder-gallery.css">
  <style>
    :root[data-theme='dark'] {
      color-scheme: dark;
      --bg: #14161a; --fg: #e8e8e6; --btn-bg: #23262c; --btn-border: #333; --btn-hover: #2c3038;
    }
    :root[data-theme='light'] {
      color-scheme: light;
      --bg: #f3f1ec; --fg: #1c1c1a; --btn-bg: #ffffff; --btn-border: #d8d4c8; --btn-hover: #eceade;
    }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--fg);
      font: 15px/1.5 system-ui, sans-serif;
      transition: background .3s, color .3s;
    }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 3rem 1rem; }
    .bar { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; }
    .bar button {
      background: var(--btn-bg); color: var(--fg); border: 1px solid var(--btn-border);
      padding: .5rem .9rem; border-radius: 999px; cursor: pointer; font: inherit;
    }
    .bar button:hover { background: var(--btn-hover); }
    /* demo content blocks so the example needs no image assets */
    .demo-note { text-align: center; padding: 1rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <button data-mode="stack">Stack</button>
      <button data-mode="grid">Grid</button>
      <button data-mode="carousel">Carousel</button>
      <button id="themeBtn">Light mode</button>
    </div>
    <div id="gallery" data-fg-theme="dark"></div>
  </div>

  <script type="module">
    import { createFolderGallery } from '../src/folder-gallery.js';

    /* Two item sets: dark studio colors with light ink, manila with dark ink.
       The gallery re-renders when the theme flips so both stay readable. */
    const SETS = {
      dark: {
        ink: '#cfcfcd',
        colors: { 'Tokyo': '#2a3a3a', 'Nairobi': '#3d2e42', 'São Paulo': '#2a2d3e', 'Copenhagen': '#3a3d2f', 'Mexico City': '#4a3030' },
      },
      light: {
        ink: '#3a3428',
        colors: { 'Tokyo': '#e8c96a', 'Nairobi': '#dd8f5e', 'São Paulo': '#8fb5a3', 'Copenhagen': '#e2cf8f', 'Mexico City': '#b58fb5' },
      },
    };

    const root = document.getElementById('gallery');
    let theme = 'dark';
    let gallery = null;
    let mode = 'stack';

    function items() {
      const s = SETS[theme];
      return Object.entries(s.colors).map(([label, color]) => ({
        label, color,
        content: `<div class="demo-note" style="color:${s.ink}">${label}</div>`,
      }));
    }

    function build() {
      if (gallery) gallery.destroy();
      root.setAttribute('data-fg-theme', theme);
      gallery = createFolderGallery(root, {
        items: items(),
        mode,
        onSelect: (item, i) => console.log('selected', item.label, i),
      });
    }

    build();

    document.querySelectorAll('[data-mode]').forEach((b) => {
      b.addEventListener('click', () => { mode = b.dataset.mode; gallery.setMode(mode); });
    });

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      themeBtn.textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
      build();
    });
  </script>
</body>
</html>
