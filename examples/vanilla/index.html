<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flipfolio example</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #f3f1ec;
      font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
    }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; padding: 2rem 0; }
    /* headroom so peeked contents have somewhere to go */
    .demo folder-gallery, .demo #gallery { margin-top: 3.5rem; }
    .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: .4rem; }
    .controls button {
      background: #fff; border: 1px solid #d8d4c8; border-radius: 999px;
      padding: .4rem .8rem; font: inherit; cursor: pointer;
    }
    .controls button.active { background: #1c1c1a; color: #f3f1ec; border-color: #1c1c1a; }
    .controls .sep { width: 1px; background: #d8d4c8; margin: 0 .3rem; }
    .hint { color: #8a857a; font-size: .8rem; }
    /* peek contents: a small fact card that slides out of the folder */
    .fact-card {
      background: #fdfcf9; border-radius: 6px; padding: 12px 16px;
      max-width: 75%; text-align: left; transform: rotate(2deg);
      box-shadow: 0 14px 30px rgba(20, 20, 20, 0.28);
    }
    .fact-card h4 { margin: 0 0 4px; font-size: .95rem; color: #1c1c1a; }
    .fact-card p { margin: 0; font-size: .82rem; color: #55503f; }
  </style>
</head>
<body>
  <div class="demo">
    <div class="controls" id="controls">
      <button data-mode="stack" class="active">Stack</button>
      <button data-mode="grid">Grid</button>
      <button data-mode="carousel">Carousel</button>
      <span class="sep"></span>
      <button id="photosBtn">Photos</button>
      <button id="peekBtn">Peek</button>
    </div>
    <div id="gallery"></div>
    <p class="hint">Arrow keys, wheel, or swipe to browse. Peek slides contents out on hover.</p>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
