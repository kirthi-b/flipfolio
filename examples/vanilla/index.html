<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flipfolio example</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #f3f1ec;
      font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
    }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; padding: 2rem 0; }
    .modes { display: flex; gap: .4rem; }
    .modes button {
      background: #fff; border: 1px solid #d8d4c8; border-radius: 999px;
      padding: .4rem .8rem; font: inherit; cursor: pointer;
    }
    .modes button.active { background: #1c1c1a; color: #f3f1ec; border-color: #1c1c1a; }
  </style>
</head>
<body>
  <div class="demo">
    <div class="modes" id="modes">
      <button data-mode="stack" class="active">Stack</button>
      <button data-mode="grid">Grid</button>
      <button data-mode="carousel">Carousel</button>
    </div>
    <div id="gallery"></div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
