name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run check
      - run: npm run build
      - name: Verify build output
        run: test -f dist/index.js && test -f dist/index.cjs && test -f dist/index.d.ts && test -f dist/folder-gallery.css
