name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Verify build output
        run: |
          for f in dist/index.js dist/index.cjs dist/index.d.ts \
                   dist/element.js dist/element.cjs dist/element.d.ts \
                   dist/react.js dist/react.cjs dist/react.d.ts \
                   dist/folder-gallery.css; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
